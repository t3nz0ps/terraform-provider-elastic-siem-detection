name: Rule to catch a hacker
rule_id: hacker_rule
description: This rule catches a hacker.
enabled: true
tags:
  - MyTag
false_positives:
  - A user might not be a hacker
license: My License
author:
  - John Doe
interval: 20m
from: now-10m
to: now
severity: low
risk_score: 21
max_signals: 100
index:
  - myindex-*
type: query
language: kuery
query: |-
  'user.name: "hacker"'
threat:
  - framework: MITRE ATT&CK
    tactic:
      id: TA001
      name: Initial Access
      reference: https://attack.mitre.org/tactics/TA0001/
    technique:
      - id: T1133
        name: External Remote Services
        reference: https://attack.mitre.org/techniques/T1133/
actions:
- id: <ID>
  params:
    message: |-
      Some message for concerned user

      {{{context.results_link}}}
  action_type_id: .teams
  frequency:
    summary: true
    notifyWhen: onActiveAlert
    throttle: null
  group: default
exceptions_list:
  - list_id: hacker
    id: <GENERATED_LIST_ID>
    namespace_type: single
    type: detection
